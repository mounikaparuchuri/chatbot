<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Chat Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f5f5;
            --bg-secondary: #fff;
            --bg-tertiary: #f0f0f0;
            --border-color: #e5e5e5;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --text-tertiary: #999;
            --input-border: #d0d0d0;
            --shadow: rgba(0, 0, 0, 0.05);
            --error-bg: #fce8e6;
            --error-text: #d93025;
        }

        body.dark-mode {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #3d3d3d;
            --border-color: #404040;
            --text-primary: #e5e5e5;
            --text-secondary: #b0b0b0;
            --text-tertiary: #808080;
            --input-border: #505050;
            --shadow: rgba(0, 0, 0, 0.3);
            --error-bg: #5c2a2a;
            --error-text: #ff6b6b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
        }

        .header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .theme-toggle {
            background-color: #0A403D;
            border: 1px solid #0A403D;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: white;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background-color: #0d5c57;
            border-color: #0d5c57;
        }

        .theme-icon {
            width: 16px;
            height: 16px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 1120px;
        }

        .message.user {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .message.assistant {
            margin-right: auto;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .message.user .message-avatar {
            background-color: #5436DA;
            color: white;
        }

        .message.assistant .message-avatar {
            background-color: #d97757;
            color: white;
        }

        .message-content {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 12px 16px;
            box-shadow: 0 1px 2px var(--shadow);
            line-height: 1.6;
            color: var(--text-primary);
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .message-content code {
            background-color: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .message-content pre {
            background-color: var(--bg-tertiary);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message-content pre code {
            background-color: transparent;
            padding: 0;
            font-size: 0.85em;
            line-height: 1.5;
        }

        .message-content ul,
        .message-content ol {
            margin: 8px 0;
            padding-left: 24px;
        }

        .message-content li {
            margin: 4px 0;
        }

        .message-content a {
            color: #5436DA;
            text-decoration: underline;
        }

        .message-content a:hover {
            color: #4529b8;
        }

        .message-content strong {
            font-weight: 600;
        }

        .message-content em {
            font-style: italic;
        }

        .message.user .message-content {
            background-color: var(--bg-tertiary);
        }

        .input-container {
            width: 100%;
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 16px 24px;
        }

        .input-wrapper {
            width: 80%;
            min-width: 80%;
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        #messageInput {
            flex: 1;
            min-height: 62px;
            max-height: 280px;
            padding: 17px 22px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            overflow-y: auto;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            text-align: left;
            vertical-align: top;
        }

        #messageInput::placeholder {
            text-align: left;
        }

        #messageInput:focus {
            outline: none;
            border-color: var(--input-border);
        }

        #sendButton {
            background-color: #0A403D;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #sendButton:hover:not(:disabled) {
            background-color: #0d5c57;
        }

        #sendButton:disabled {
            background-color: #0A403D;
            opacity: 0.7;
            cursor: not-allowed;
        }

        #attachButton {
            background-color: #0A403D;
            color: white;
            border: 1px solid #0A403D;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #attachButton:hover {
            background-color: #0d5c57;
            border-color: #0d5c57;
        }

        #copyButton {
            background-color: #0A403D;
            color: white;
            border: 1px solid #0A403D;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #copyButton:hover {
            background-color: #0d5c57;
            border-color: #0d5c57;
        }

        #fileInput {
            display: none;
        }

        .file-preview-container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 0 8px 0;
        }

        .file-preview {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background-color: var(--bg-tertiary);
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .file-preview-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-primary);
        }

        .file-preview-size {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .file-preview-remove {
            background: none;
            border: none;
            color: var(--error-text);
            cursor: pointer;
            font-size: 18px;
            padding: 0 4px;
            line-height: 1;
        }

        .file-preview-remove:hover {
            color: #a52714;
        }

        .attach-icon,
        .copy-icon {
            width: 20px;
            height: 20px;
        }

        .loading {
            display: flex;
            gap: 4px;
            padding: 8px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-tertiary);
            animation: loading 1.4s infinite;
        }

        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes loading {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        .error-message {
            color: var(--error-text);
            background-color: var(--error-bg);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
        }

        .history-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-tertiary);
            font-size: 12px;
            max-width: 1120px;
            width: 100%;
            margin: 0 auto;
        }

        .history-divider::before,
        .history-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: var(--border-color);
        }
        .new-chat-button {
            background-color: #0A403D;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .new-chat-button:hover {
            background-color: #0d5c57;
        }

        .conversation-starter-highlight {
            background-color: #0A403D !important;
            color: white !important;
            border-color: #0A403D !important;
        }
        .conversation-starter-highlight:hover {
            background-color: #0d5c57 !important;
            border-color: #0d5c57 !important;
        }

        .start-over-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .start-over-overlay.show {
            display: flex;
        }
        .start-over-modal {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
        }
        .start-over-modal p {
            margin: 0 0 20px 0;
            color: var(--text-primary);
            line-height: 1.5;
        }
        .start-over-modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .start-over-modal-buttons button {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #0A403D;
            background: #0A403D;
            color: white;
        }
        .start-over-modal-buttons button:hover {
            background: #0d5c57;
            border-color: #0d5c57;
        }
        .start-over-modal-buttons .start-over-continue {
            background: #0A403D;
            color: white;
            border-color: #0A403D;
        }
        .start-over-modal-buttons .start-over-continue:hover {
            background: #0d5c57;
            border-color: #0d5c57;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.9.0/mammoth.browser.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="header-title">FMC3</div>
            <button id="newChatButton" class="new-chat-button">Start Over</button>
        </div>
        <button class="theme-toggle" id="themeToggle">
            <svg class="theme-icon" id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <span id="themeText">Dark</span>
        </button>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message assistant" id="welcomeMessage">
            <div class="message-avatar">C</div>
            <div class="message-content">Welcome to Chapter 3's Energy Tracker Assessment.<br><br>click the start conversation button below.</div>
        </div>
    </div>

    <div class="input-container">
        <div class="file-preview-container" id="conversationStarterContainer" style="padding: 0 0 12px 0;">
            <button id="conversationStarter" style="
                width: 100%;
                max-width: 1120px;
                margin: 0 auto;
                display: block;
                background-color: #0A403D;
                color: white;
                border: 1px solid #0A403D;
                border-radius: 10px;
                padding: 10px 12px;
                font-size: 14px;
                cursor: pointer;
                transition: all 0.2s;
            ">Start conversation</button>
        </div>
        <div class="file-preview-container" id="filePreviewContainer"></div>
        <div class="input-wrapper" id="inputWrapper">
            <input type="file" id="fileInput" multiple accept="*/*">
            <button id="copyButton" title="Copy conversation">
                <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
            </button>
            <button id="attachButton" title="Attach files">
                <svg class="attach-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                </svg>
            </button>
            <textarea
                id="messageInput"
                placeholder="Type your message here..."
                rows="1"
            ></textarea>
            <button id="sendButton">Send</button>
        </div>
    </div>

    <div id="startOverOverlay" class="start-over-overlay" aria-hidden="true">
        <div class="start-over-modal">
            <p id="startOverMessage">This will delete the conversation and start over.</p>
            <div class="start-over-modal-buttons">
                <button type="button" id="startOverCancel">Cancel</button>
                <button type="button" id="startOverContinue" class="start-over-continue">Continue</button>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const fileInput = document.getElementById('fileInput');
        const attachButton = document.getElementById('attachButton');
        const copyButton = document.getElementById('copyButton');
        const filePreviewContainer = document.getElementById('filePreviewContainer');
        const conversationStarter = document.getElementById('conversationStarter');
        const conversationStarterContainer = document.getElementById('conversationStarterContainer');
        const inputWrapper = document.getElementById('inputWrapper');
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');

        const WEBHOOK_URL = 'https://n8n.paruchuri.net/webhook/c174df6e-5834-4eef-a680-ad5aab3536e8/chat';
        
        const newChatButton = document.getElementById('newChatButton');

        const WELCOME_MESSAGE_HTML = '<div class="message assistant">' +
                    '<div class="message-avatar">C<\/div>' +
                    '<div class="message-content">Welcome to Chapter 3\'s Talent Interest Explorer.<br><br>Click the start conversation button below.<\/div>' +
                    '<\/div>';

        let attachedFiles = [];
        let hasHistory = false;

        // URL params for session (iframe: ?user_id=...&course_id=...)
        const urlParams = new URLSearchParams(window.location.search);
        const userId = '{{USER_ID}}' || '';
        const courseId = '{{COURSE_ID}}' || '';

        // ── Conversation starter button (only for new chat; with history we show input directly) ─────────────────────────
        function updateConversationStarterUI() {
            if (conversationStarter) {
                conversationStarter.textContent = 'Start conversation';
                conversationStarter.classList.add('conversation-starter-highlight');
            }
            if (hasHistory) {
                setConversationStarterVisible(false);
                if (messageInput) messageInput.placeholder = 'answer question to continue...';
            } else {
                setConversationStarterVisible(true);
                if (messageInput) messageInput.placeholder = 'Type your message here...';
            }
        }

        function setConversationStarterVisible(visible) {
            if (conversationStarterContainer) conversationStarterContainer.style.display = visible ? '' : 'none';
            if (inputWrapper) inputWrapper.style.display = visible ? 'none' : '';
        }

        conversationStarter.addEventListener('click', () => {
            triggerStarterOnly('start conversation');
        });

        // ── Dark mode ────────────────────────────────────────────
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            updateThemeIcon(true);
        }

        themeToggle.addEventListener('click', () => {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        });

        function updateThemeIcon(isDark) {
            if (isDark) {
                themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"><\/path>';
                themeText.textContent = 'Light';
            } else {
                themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"><\/circle><line x1="12" y1="1" x2="12" y2="3"><\/line><line x1="12" y1="21" x2="12" y2="23"><\/line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"><\/line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"><\/line><line x1="1" y1="12" x2="3" y2="12"><\/line><line x1="21" y1="12" x2="23" y2="12"><\/line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"><\/line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"><\/line>';
                themeText.textContent = 'Dark';
            }
        }
        function startNewChat() {
            // Recalculate sessionId for new conversation
            if (userId && courseId) {
                sessionId = `session_${userId}_${courseId}_${Math.random().toString(36).substring(2, 9)}`;
            } else {
                sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substring(2, 9);
            }
            localStorage.setItem('chatSessionId_gpt2', sessionId);
            console.log('New Chat – Session ID:', sessionId);

            // Clear UI
            chatContainer.innerHTML = WELCOME_MESSAGE_HTML;

            // Clear input
            messageInput.value = '';

            // Clear attachments
            attachedFiles = [];
            filePreviewContainer.innerHTML = '';

            // Clear stored conversation if using local storage (GPT2-specific key)
            localStorage.removeItem('chatHistory_gpt2');

            // Show and highlight the start conversation button (new chat state)
            hasHistory = false;
            setConversationStarterVisible(true);
            updateConversationStarterUI();

            // Scroll to top
            chatContainer.scrollTop = 0;
        }

        const startOverOverlay = document.getElementById('startOverOverlay');
        const startOverCancelBtn = document.getElementById('startOverCancel');
        const startOverContinueBtn = document.getElementById('startOverContinue');

        function openStartOverModal() {
            if (startOverOverlay) {
                startOverOverlay.classList.add('show');
                startOverOverlay.setAttribute('aria-hidden', 'false');
            }
        }
        function closeStartOverModal() {
            if (startOverOverlay) {
                startOverOverlay.classList.remove('show');
                startOverOverlay.setAttribute('aria-hidden', 'true');
            }
        }

        newChatButton.addEventListener('click', openStartOverModal);
        startOverCancelBtn.addEventListener('click', closeStartOverModal);
        startOverContinueBtn.addEventListener('click', () => {
            closeStartOverModal();
            startNewChat();
        });
        startOverOverlay.addEventListener('click', (e) => {
            if (e.target === startOverOverlay) closeStartOverModal();
        });

        // ── Session ID (separate from chat_interface.html / n8n GPT2 session) ─
        // Use stored sessionId unless missing (then compute and store)
        let sessionId = localStorage.getItem('chatSessionId_gpt2');
        if (!sessionId) {
            if (userId && courseId) {
                sessionId = `session_${userId}_${courseId}_${Math.random().toString(36).substring(2, 9)}`;
            } else {
                sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substring(2, 9);
            }
            localStorage.setItem('chatSessionId_gpt2', sessionId);
        }
        console.log('Session ID (GPT2):', sessionId);

        // ── Load recent conversation history on page load ─────────
        async function loadRecentMessages() {
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'loadPreviousSession',
                        sessionId: sessionId
                    })
                });

                if (!res.ok) return;

                const data = await res.json();
                const messages = data?.data;
                if (!Array.isArray(messages) || messages.length === 0) return;

                // ── Filter to only real human <-> AI conversation messages ──
                // Handles both LangChain class-based format (id array) and
                // plain object format (type field) that n8n sometimes returns.
                // Strips out:
                //   - ToolMessage, FunctionMessage, SystemMessage
                //   - AI messages that are pure tool calls (tool_calls array populated, no real content)
                //   - AI messages with empty content
                //   - Messages with "Calling X with input" pattern in content
                const conversationOnly = messages.filter(msg => {
                    // Support both formats n8n may return
                    const idPath = msg?.id ?? [];
                    const classType = idPath[idPath.length - 1] ?? '';
                    const typeField = msg?.type ?? '';

                    // Determine if human or AI using either format
                    const isHuman = classType === 'HumanMessage' || typeField === 'human';
                    const isAI    = classType === 'AIMessage'    || typeField === 'ai';

                    if (!isHuman && !isAI) return false;

                    const content   = msg?.kwargs?.content ?? msg?.content ?? '';
                    const toolCalls = msg?.kwargs?.tool_calls ?? msg?.tool_calls ?? [];

                    // Drop messages with no text content
                    if (typeof content !== 'string' || content.trim() === '') return false;

                    // Drop AI messages that are purely tool invocations
                    if (isAI && Array.isArray(toolCalls) && toolCalls.length > 0) return false;

                    // Drop AI messages whose content is an internal "Calling X with input" trace
                    if (isAI && /^Calling\s+\S+\s+with\s+input:/i.test(content.trim())) return false;

                    return true;
                });

                if (conversationOnly.length === 0) return;

                // Always show welcome message first, then full history
                chatContainer.innerHTML = WELCOME_MESSAGE_HTML;

                conversationOnly.forEach(msg => {
                    const idPath   = msg?.id ?? [];
                    const classType = idPath[idPath.length - 1] ?? '';
                    const typeField = msg?.type ?? '';
                    const isHuman  = classType === 'HumanMessage' || typeField === 'human';
                    const content  = msg?.kwargs?.content ?? msg?.content ?? '';
                    addMessage(content, isHuman);
                });

                hasHistory = true;
                updateConversationStarterUI();

            } catch (e) {
                console.warn('Could not load previous session:', e);
            }
        }

        loadRecentMessages();

        // Default state when there's no history (or history fails to load)
        updateConversationStarterUI();

        // ── Auto-resize textarea ─────────────────────────────────
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 280) + 'px';
        });

        // ── File attachment ──────────────────────────────────────
        attachButton.addEventListener('click', () => fileInput.click());

        copyButton.addEventListener('click', function() {
            var messages = chatContainer.querySelectorAll('.message');
            var lines = [];
            for (var i = 0; i < messages.length; i++) {
                var msg = messages[i];
                if (msg.id === 'loadingMessage') continue;
                var contentEl = msg.querySelector('.message-content');
                if (!contentEl) continue;
                var role = msg.classList.contains('user') ? 'User' : 'Assistant';
                var text = contentEl.innerText || contentEl.textContent || '';
                if (text.trim()) lines.push(role + ':\n' + text.trim());
            }
            var transcript = lines.join('\n\n');
            if (!transcript) {
                if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText('').catch(function(){});
                return;
            }
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(transcript).then(function() {
                    var orig = copyButton.title;
                    copyButton.title = 'Copied!';
                    copyButton.setAttribute('aria-label', 'Copied!');
                    setTimeout(function() { copyButton.title = orig; copyButton.setAttribute('aria-label', orig); }, 1500);
                }).catch(function() {});
            }
        });

        fileInput.addEventListener('change', (e) => {
            attachedFiles = [...attachedFiles, ...Array.from(e.target.files)];
            updateFilePreview();
            fileInput.value = '';
        });

        function updateFilePreview() {
            filePreviewContainer.innerHTML = '';
            attachedFiles.forEach((file, index) => {
                const preview = document.createElement('div');
                preview.className = 'file-preview';

                const fileName = document.createElement('span');
                fileName.className = 'file-preview-name';
                fileName.textContent = file.name;

                const fileSize = document.createElement('span');
                fileSize.className = 'file-preview-size';
                fileSize.textContent = formatFileSize(file.size);

                const removeBtn = document.createElement('button');
                removeBtn.className = 'file-preview-remove';
                removeBtn.innerHTML = '&times;';
                removeBtn.onclick = () => {
                    attachedFiles.splice(index, 1);
                    updateFilePreview();
                };

                preview.appendChild(fileName);
                preview.appendChild(fileSize);
                preview.appendChild(removeBtn);
                filePreviewContainer.appendChild(preview);
            });
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        async function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        /** Strip `data:mime;base64,` so n8n / Buffer.from(x, 'base64') accepts `files[].data`. */
        function dataUrlToRawBase64(dataUrl) {
            if (typeof dataUrl !== 'string') return '';
            const i = dataUrl.indexOf(',');
            return i >= 0 ? dataUrl.slice(i + 1) : dataUrl;
        }

        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.worker.min.js';
        }

        const MAX_EXTRACTED_FILE_TEXT = 450000;

        function isDocxFile(file) {
            const t = (file.type || '').toLowerCase();
            const n = (file.name || '').toLowerCase();
            return (
                t === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
                || n.endsWith('.docx')
            );
        }

        /** Legacy Word .doc (binary) — not supported in-browser; .docx works via Mammoth. */
        function isLegacyWordDoc(file) {
            const t = (file.type || '').toLowerCase();
            const n = (file.name || '').toLowerCase();
            if (n.endsWith('.docx')) return false;
            return t === 'application/msword' || n.endsWith('.doc');
        }

        function isPdfFile(file) {
            const t = (file.type || '').toLowerCase();
            const n = (file.name || '').toLowerCase();
            return t === 'application/pdf' || n.endsWith('.pdf');
        }

        /** Pull text from PDF so chatInput contains real content (many n8n agents only read chatInput). */
        async function extractPdfTextForWebhook(file) {
            if (typeof pdfjsLib === 'undefined') return null;
            try {
                const buf = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
                let full = '';
                for (let p = 1; p <= pdf.numPages; p++) {
                    const page = await pdf.getPage(p);
                    const content = await page.getTextContent();
                    const line = content.items.map(function (item) { return item.str; }).join(' ');
                    full += line + '\n\n';
                }
                let t = full.replace(/\s+\n/g, '\n').trim();
                if (!t) return null;
                if (t.length > MAX_EXTRACTED_FILE_TEXT) {
                    t = t.slice(0, MAX_EXTRACTED_FILE_TEXT) + '\n\n[PDF text truncated for size]';
                }
                return t;
            } catch (e) {
                console.warn('PDF text extract failed:', e);
                return null;
            }
        }

        /** Word .docx → plain text for chatInput (same idea as PDF extraction). */
        async function extractDocxTextForWebhook(file) {
            if (typeof mammoth === 'undefined') return null;
            try {
                const buf = await file.arrayBuffer();
                const result = await mammoth.extractRawText({ arrayBuffer: buf });
                let t = (result.value || '').replace(/\r\n/g, '\n').trim();
                if (!t) return null;
                if (t.length > MAX_EXTRACTED_FILE_TEXT) {
                    t = t.slice(0, MAX_EXTRACTED_FILE_TEXT) + '\n\n[Word document text truncated for size]';
                }
                return t;
            } catch (e) {
                console.warn('DOCX text extract failed:', e);
                return null;
            }
        }

        /** Inline into chatInput as UTF-8 text; binary types stay in files[] only. */
        function isTextLikeFile(file) {
            if (isPdfFile(file) || isDocxFile(file) || isLegacyWordDoc(file)) return false;
            const t = (file.type || '').toLowerCase();
            if (t.startsWith('text/')) return true;
            if (t === 'application/json' || t === 'application/xml' || t.endsWith('+xml')) return true;
            const n = (file.name || '').toLowerCase();
            return /\.(txt|md|csv|json|log|xml|html?|yaml|yml|tsv|rtf)$/i.test(n);
        }

        function readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(typeof reader.result === 'string' ? reader.result : '');
                reader.onerror = () => reject(reader.error);
                reader.readAsText(file);
            });
        }

        /** Merges textarea text + file contents into one string for n8n (often only reads chatInput). */
        async function buildChatInputForWebhook(baseMessage, fileArray) {
            const parts = [];
            let text = baseMessage == null ? '' : baseMessage;
            if (typeof text !== 'string') text = String(text);
            const trimmed = text.trim();
            if (trimmed) parts.push(trimmed);
            for (const file of fileArray) {
                const label = file.name || 'attachment';
                if (isTextLikeFile(file)) {
                    try {
                        const text = await readFileAsText(file);
                        parts.push('\n\n--- File: ' + label + ' ---\n' + text);
                    } catch (e) {
                        parts.push('\n\n--- File: ' + label + ' (unreadable as text) ---');
                    }
                } else if (isPdfFile(file)) {
                    const pdfText = await extractPdfTextForWebhook(file);
                    if (pdfText) {
                        parts.push('\n\n--- PDF resume/document: ' + label + ' (extracted text) ---\n' + pdfText);
                    } else {
                        parts.push('\n\n--- PDF: ' + label + ' (no text layer — likely scanned image). Raw bytes are still in JSON `files[]` for server-side OCR. ---');
                    }
                } else if (isDocxFile(file)) {
                    const docText = await extractDocxTextForWebhook(file);
                    if (docText) {
                        parts.push('\n\n--- Word document (.docx): ' + label + ' (extracted text) ---\n' + docText);
                    } else {
                        parts.push('\n\n--- Word (.docx): ' + label + ' (could not extract text). Binary is still in JSON `files[]`. ---');
                    }
                } else if (isLegacyWordDoc(file)) {
                    parts.push('\n\n--- Legacy Word (.doc): ' + label + ' — this page cannot read old .doc files in the browser. Save as .docx or PDF and re-upload. Binary is in `files[]`. ---');
                } else {
                    parts.push('\n\n[Attached: ' + label + ' — binary is in JSON `files[]` as raw Base64 in `data` (field `dataEncoding` is base64)]');
                }
            }
            return parts.join('').trim();
        }

        // ── Keyboard shortcut ────────────────────────────────────
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendButton.addEventListener('click', sendMessage);

        messageInput.addEventListener('paste', function (e) {
            const cd = e.clipboardData;
            if (!cd || !cd.files || cd.files.length === 0) return;
            e.preventDefault();
            for (let i = 0; i < cd.files.length; i++) {
                attachedFiles.push(cd.files[i]);
            }
            updateFilePreview();
        });

        // ── Render a message bubble ──────────────────────────────
        function addMessage(content, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + (isUser ? 'user' : 'assistant');

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = isUser ? 'U' : 'C';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = formatMessage(content);

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return contentDiv;
        }

        function formatMessage(text) {
            if (text == null) return '';
            if (typeof text !== 'string') {
                text = (typeof text === 'object' ? JSON.stringify(text, null, 2) : String(text));
            }
            text = text.replace(/&/g, '&amp;')
                       .replace(/</g, '&lt;')
                       .replace(/>/g, '&gt;')
                       .replace(/"/g, '&quot;')
                       .replace(/'/g, '&#039;');

            text = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1<\/code><\/pre>');
            text = text.replace(/`([^`]+)`/g, '<code>$1<\/code>');
            text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1<\/strong>');
            text = text.replace(/__([^_]+)__/g, '<strong>$1<\/strong>');
            text = text.replace(/\*([^*]+)\*/g, '<em>$1<\/em>');
            text = text.replace(/_([^_]+)_/g, '<em>$1<\/em>');
            text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1<\/a>');
            text = text.replace(/^[\-\*]\s+(.+)$/gm, '<li>$1<\/li>');
            text = text.replace(/(<li>.*<\/li>)/s, '<ul>$1<\/ul>');
            text = text.replace(/^\d+\.\s+(.+)$/gm, '<li>$1<\/li>');
            text = text.replace(/\n/g, '<br>');

            return text;
        }

        // ── Loading indicator ────────────────────────────────────
        function addLoadingMessage() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'loadingMessage';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = 'C';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            const loading = document.createElement('div');
            loading.className = 'loading';
            loading.innerHTML = '<div class="loading-dot"><\/div><div class="loading-dot"><\/div><div class="loading-dot"><\/div>';

            contentDiv.appendChild(loading);
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return messageDiv;
        }

        function removeLoadingMessage() {
            const el = document.getElementById('loadingMessage');
            if (el) el.remove();
        }

        /**
         * n8n "Respond to Webhook" / AI Agent shapes vary: flat output, nested json/body,
         * OpenAI choices, LangChain messages[], multimodal content arrays.
         */
        function extractN8nWebhookReply(raw, depth) {
            depth = depth || 0;
            if (depth > 12 || raw == null) return null;

            if (typeof raw === 'string') return raw.trim() !== '' ? raw : null;

            if (Array.isArray(raw)) {
                for (let i = 0; i < raw.length; i++) {
                    const r = extractN8nWebhookReply(raw[i], depth + 1);
                    if (r) return r;
                }
                return null;
            }

            if (typeof raw !== 'object') {
                const s = String(raw);
                return s.trim() !== '' ? s : null;
            }

            if (raw.json != null) {
                const r = extractN8nWebhookReply(raw.json, depth + 1);
                if (r) return r;
            }
            if (raw.body != null) {
                const r = extractN8nWebhookReply(raw.body, depth + 1);
                if (r) return r;
            }

            const keyOrder = ['response', 'message', 'text', 'content', 'answer', 'result', 'reply', 'assistant'];
            for (let i = 0; i < keyOrder.length; i++) {
                const v = raw[keyOrder[i]];
                if (v == null) continue;
                if (typeof v === 'string' && v.trim() !== '') return v;
                const nested = extractN8nWebhookReply(v, depth + 1);
                if (nested) return nested;
            }

            if (raw.output != null) {
                const o = raw.output;
                if (typeof o === 'string' && o.trim() !== '') return o;
                const nested = extractN8nWebhookReply(o, depth + 1);
                if (nested) return nested;
            }

            if (Array.isArray(raw.choices) && raw.choices[0]) {
                const m = raw.choices[0].message;
                if (m && typeof m.content === 'string' && m.content.trim() !== '') return m.content;
                if (m && Array.isArray(m.content)) {
                    const joined = m.content.map(function (p) {
                        if (typeof p === 'string') return p;
                        if (p && p.type === 'text' && p.text) return p.text;
                        return '';
                    }).join('');
                    if (joined.trim() !== '') return joined;
                }
            }

            if (Array.isArray(raw.messages) && raw.messages.length) {
                for (let j = raw.messages.length - 1; j >= 0; j--) {
                    const msg = raw.messages[j];
                    if (!msg || typeof msg !== 'object') continue;
                    const role = (msg.role || msg.type || '').toLowerCase();
                    if (role === 'user' || role === 'human' || role === 'system') continue;
                    let c = msg.content;
                    if (c == null && msg.kwargs) c = msg.kwargs.content;
                    if (typeof c === 'string' && c.trim() !== '') return c;
                    if (Array.isArray(c)) {
                        const t = c.map(function (p) {
                            if (typeof p === 'string') return p;
                            if (p && p.type === 'text' && p.text) return p.text;
                            return '';
                        }).join('');
                        if (t.trim() !== '') return t;
                    }
                }
            }

            if (typeof raw.data === 'string' && raw.data.trim() !== '') return raw.data;
            if (raw.data != null && typeof raw.data === 'object') {
                const nested = extractN8nWebhookReply(raw.data, depth + 1);
                if (nested) return nested;
            }

            return null;
        }

        function formatMissingWebhookReply(data) {
            return 'No assistant text was found in the JSON (checked output, message, text, nested json/body, choices, messages). '
                + 'In n8n, set "Respond to Webhook" to include a string the UI can read, or rename the field. Raw payload:\n\n'
                + JSON.stringify(data, null, 2);
        }

        // ── Start conversation: webhook only, no user message in chat ──
        async function triggerStarterOnly(starterText) {
            // #region agent log
            var _t0 = Date.now();
            fetch('http://127.0.0.1:7907/ingest/57e47666-fc1b-41af-8061-71b696c59f5b',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'8203d6'},body:JSON.stringify({sessionId:'8203d6',location:'chat_interface.html:triggerStarterOnly',message:'phase_start',data:{phase:'entry',elapsedMs:0},timestamp:Date.now(),hypothesisId:'D'})}).catch(function(){});
            // #endregion
            setConversationStarterVisible(false);
            if (messageInput) messageInput.placeholder = 'Type your message here...';
            addLoadingMessage();
            // #region agent log
            fetch('http://127.0.0.1:7907/ingest/57e47666-fc1b-41af-8061-71b696c59f5b',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'8203d6'},body:JSON.stringify({sessionId:'8203d6',location:'chat_interface.html:triggerStarterOnly',message:'phase_after_initial_dom',data:{phase:'after_initial_dom',elapsedMs:Date.now()-_t0},timestamp:Date.now(),hypothesisId:'D'})}).catch(function(){});
            var _tFetchStart = Date.now();
            // #endregion
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionId: sessionId,
                        chatInput: starterText,
                        timestamp: new Date().toISOString()
                    })
                });
                // #region agent log
                fetch('http://127.0.0.1:7907/ingest/57e47666-fc1b-41af-8061-71b696c59f5b',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'8203d6'},body:JSON.stringify({sessionId:'8203d6',location:'chat_interface.html:triggerStarterOnly',message:'phase_after_fetch',data:{phase:'after_fetch',elapsedMs:Date.now()-_t0,fetchMs:Date.now()-_tFetchStart},timestamp:Date.now(),hypothesisId:'A'})}).catch(function(){});
                var _tParseStart = Date.now();
                // #endregion
                if (!response.ok) throw new Error('HTTP error! status: ' + response.status);
                const data = await response.json();
                // #region agent log
                fetch('http://127.0.0.1:7907/ingest/57e47666-fc1b-41af-8061-71b696c59f5b',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'8203d6'},body:JSON.stringify({sessionId:'8203d6',location:'chat_interface.html:triggerStarterOnly',message:'phase_after_json',data:{phase:'after_json',elapsedMs:Date.now()-_t0,parseMs:Date.now()-_tParseStart},timestamp:Date.now(),hypothesisId:'B'})}).catch(function(){});
                var _tDomStart = Date.now();
                // #endregion
                removeLoadingMessage();
                const responseText = extractN8nWebhookReply(data) || formatMissingWebhookReply(data);
                addMessage(responseText, false);
                // #region agent log
                fetch('http://127.0.0.1:7907/ingest/57e47666-fc1b-41af-8061-71b696c59f5b',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'8203d6'},body:JSON.stringify({sessionId:'8203d6',location:'chat_interface.html:triggerStarterOnly',message:'phase_after_addMessage',data:{phase:'after_addMessage',elapsedMs:Date.now()-_t0,domMs:Date.now()-_tDomStart,responseLength:(responseText&&responseText.length)||0},timestamp:Date.now(),hypothesisId:'C'})}).catch(function(){});
                // #endregion
            } catch (error) {
                console.error('Error:', error);
                removeLoadingMessage();
                const errorDiv = document.createElement('div');
                errorDiv.className = 'message assistant';
                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = 'C';
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content error-message';
                contentDiv.textContent = 'Error: ' + error.message + '. Please check your webhook URL and ensure your n8n workflow is running.';
                errorDiv.appendChild(avatar);
                errorDiv.appendChild(contentDiv);
                chatContainer.appendChild(errorDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
            messageInput.focus();
            // #region agent log
            fetch('http://127.0.0.1:7907/ingest/57e47666-fc1b-41af-8061-71b696c59f5b',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'8203d6'},body:JSON.stringify({sessionId:'8203d6',location:'chat_interface.html:triggerStarterOnly',message:'phase_end',data:{phase:'end',elapsedMs:Date.now()-_t0},timestamp:Date.now(),hypothesisId:'E'})}).catch(function(){});
            // #endregion
        }

        // ── Send message ─────────────────────────────────────────
        async function sendMessage(directMessage) {
            // Send button passes the click event as first arg; only treat a real string as typed text.
            let message = typeof directMessage === 'string' ? directMessage : messageInput.value;
            if (typeof message !== 'string') message = '';
            message = message.trim();
            if (!message && attachedFiles.length === 0) return;

            // Once a message is sent, the starter CTA is no longer needed.
            setConversationStarterVisible(false);

            let displayMessage = message;
            if (attachedFiles.length > 0) {
                const fileNames = attachedFiles.map(f => f.name).join(', ');
                displayMessage = message + (message ? '\n\n' : '') + '📎 ' + attachedFiles.length + ' file(s): ' + fileNames;
            }
            addMessage(displayMessage || '📎 ' + attachedFiles.length + ' file(s)', true);

            messageInput.value = '';
            messageInput.style.height = 'auto';
            sendButton.disabled = true;
            addLoadingMessage();

            try {
                const filesData = await Promise.all(
                    attachedFiles.map(async (file) => {
                        const dataUrl = await fileToBase64(file);
                        return {
                            name: file.name,
                            type: file.type || 'application/octet-stream',
                            size: file.size,
                            dataEncoding: 'base64',
                            data: dataUrlToRawBase64(dataUrl)
                        };
                    })
                );

                const chatInputMerged = await buildChatInputForWebhook(message, attachedFiles);

                const payload = {
                    sessionId: sessionId,
                    chatInput: chatInputMerged,
                    timestamp: new Date().toISOString()
                };

                if (filesData.length > 0) payload.files = filesData;

                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('HTTP error! status: ' + response.status);

                const data = await response.json();
                removeLoadingMessage();

                const responseText = extractN8nWebhookReply(data) || formatMissingWebhookReply(data);
                addMessage(responseText, false);

            } catch (error) {
                console.error('Error:', error);
                removeLoadingMessage();

                const errorDiv = document.createElement('div');
                errorDiv.className = 'message assistant';

                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = 'C';

                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content error-message';
                contentDiv.textContent = 'Error: ' + error.message + '. Please check your webhook URL and ensure your n8n workflow is running.';

                errorDiv.appendChild(avatar);
                errorDiv.appendChild(contentDiv);
                chatContainer.appendChild(errorDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;

            } finally {
                attachedFiles = [];
                updateFilePreview();
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        messageInput.focus();
    </script>
